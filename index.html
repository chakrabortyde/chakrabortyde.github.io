<style>
    .timeline {
        border-left: 3px solid;
        margin: 0 0;
        position: relative;
        padding: 16px 50px 10px 50px;
        list-style: none;
        text-align: left;
    }

    @media (max-width: 767px) {
        .timeline {
            max-width: 98%;
            padding: 8px 25px 0 25px;
        }
    }

    .timeline .event {
        padding-bottom: 0;
        margin-bottom: 0;
        position: relative;
    }

    @media (max-width: 767px) {
        .timeline .event {
            padding-top: 30px;
        }
    }

    .timeline .event:last-of-type {
        padding-bottom: 0;
        margin-bottom: 0;
        border: none;
    }

    .timeline .event:before,
    .timeline .event:after {
        position: absolute;
        display: block;
        top: 0;
    }

    .timeline .event:before {
        left: -207px;
        content: attr(data-date);
        text-align: right;
        font-weight: bold;
        font-size: 0.9em;
        min-width: 120px;
    }

    @media (max-width: 767px) {
        .timeline .event:before {
            left: 0;
            text-align: left;
        }
    }

    .timeline .event:after {
        -webkit-box-shadow: 0 0 0 3px;
        box-shadow: 0 0 0 3px;
        left: -55.8px;
        background: #fff;
        border-radius: 50%;
        height: 9px;
        width: 9px;
        content: "";
        top: 5px;
    }

    @media (max-width: 767px) {
        .timeline .event:after {
            left: -31.8px;
        }
    }
</style>
